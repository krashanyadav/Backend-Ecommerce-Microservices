services:
  nginx:
    image: nginx:latest
    ports:
      - 80:80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

  gateway1:
    build: ./api-gateway
    ports:
      - 5002:5009
    environment:
      - GATEWAY=pahla
    env_file:
      - ./api-gateway/.env

  gateway2:
    build: ./api-gateway
    ports:
      - 5003:5009
    environment:
      - GATEWAY=dusra
    env_file:
    - ./api-gateway/.env
        

  redis:
    image: redis
    ports:
      - 6379:6379


  authservice:
    build: ./1.auth-service
    ports:
      - 4000:4000
    env_file:
      - ./1.auth-service/.env
  productservice:
    build: ./2.product-service
    ports:
      - 4005:4005
    env_file:
      - ./2.product-service/.env
  cartservice:
    build: ./3.cart-service
    ports:
      - 4002:4002
    env_file:
      - ./3.cart-service/.env
  orderservice:
    build: ./4.order-service
    ports:
      - 4003:4003
    env_file:
      - ./4.order-service/.env
  paymentservice:
    build: ./5.payment-service
    ports:
      - 4004:4004
    env_file:
      - ./5.payment-service/.env
